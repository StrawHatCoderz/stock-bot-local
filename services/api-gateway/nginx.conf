# Routes every endpoint in phase-1/05_api-contract.md to its owning mock
# service, so the Node agent's ToolExecutor only needs one base URL
# (http://localhost:8080) instead of three. Path prefixes match the
# contract exactly, and proxy_pass has no trailing path here on purpose —
# that makes nginx forward the original request URI unchanged, so no
# rewriting is needed since each backend already serves these exact paths.

server {
    listen 80;

    location /api/login {
        proxy_pass http://auth-service:8081;
    }

    location /api/me {
        proxy_pass http://auth-service:8081;
    }

    location /api/validation/ {
        proxy_pass http://validation-service:8082;
    }

    location /api/stock {
        proxy_pass http://stock-service:8083;
    }
}
