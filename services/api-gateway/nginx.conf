# Routes every endpoint in phase-1/05_api-contract.md to its owning mock
# service, so the Node agent's ToolExecutor only needs one base URL
# (http://localhost:8080) instead of three. Path prefixes match the
# contract exactly, and proxy_pass has no trailing path here on purpose —
# that makes nginx forward the original request URI unchanged, so no
# rewriting is needed since each backend already serves these exact paths.

server {
    listen 80;

    # Resolve upstream hostnames per-request via variables below, not once at nginx startup — a static proxy_pass target can fail startup if the hostname isn't resolvable yet.
    resolver 127.0.0.11 valid=10s;

    location /api/login {
        set $auth_upstream http://auth-service:8081;
        proxy_pass $auth_upstream;
    }

    location /api/me {
        set $auth_upstream http://auth-service:8081;
        proxy_pass $auth_upstream;
    }

    location /api/auth/ {
        set $auth_upstream http://auth-service:8081;
        proxy_pass $auth_upstream;
    }

    location /api/validation/ {
        set $validation_upstream http://validation-service:8082;
        proxy_pass $validation_upstream;
    }

    location /api/stock {
        set $stock_upstream http://stock-service:8083;
        proxy_pass $stock_upstream;
    }

    location /api/transfer {
        set $transfer_upstream http://transfer-service:8084;
        proxy_pass $transfer_upstream;
    }
}
