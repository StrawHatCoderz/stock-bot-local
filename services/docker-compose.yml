services:
  auth-service:
    build:
      context: .
      target: auth-service
    networks:
      - mock-net

  validation-service:
    build:
      context: .
      target: validation-service
    networks:
      - mock-net

  stock-service:
    build:
      context: .
      target: stock-service
    networks:
      - mock-net

  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - validation-service
      - stock-service
    networks:
      - mock-net

networks:
  mock-net:
    driver: bridge
