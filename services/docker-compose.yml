services:
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    networks:
      - mock-net

  validation-service:
    build:
      context: .
      dockerfile: validation-service/Dockerfile
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
    networks:
      - mock-net

  stock-service:
    build:
      context: .
      dockerfile: stock-service/Dockerfile
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
    networks:
      - mock-net

  transfer-service:
    build:
      context: .
      dockerfile: transfer-service/Dockerfile
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - STOCK_SERVICE_URL=http://stock-service:8083
    depends_on:
      - auth-service
      - stock-service
    networks:
      - mock-net

  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - validation-service
      - stock-service
      - transfer-service
    networks:
      - mock-net

networks:
  mock-net:
    driver: bridge
