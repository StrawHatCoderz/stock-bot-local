services:
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    networks:
      - mock-net

  validation-service:
    build:
      context: .
      dockerfile: validation-service/Dockerfile
    networks:
      - mock-net

  stock-service:
    build:
      context: .
      dockerfile: stock-service/Dockerfile
    networks:
      - mock-net

  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8085:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - validation-service
      - stock-service
    networks:
      - mock-net

networks:
  mock-net:
    driver: bridge
